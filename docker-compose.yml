services:
  backend:
    build:
      context: ./enterprise-pos/backend
    container_name: sansons_backend
    restart: always
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-production-default-key-please-change-in-env}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - DB_ENGINE=${DB_ENGINE:-django.db.backends.postgresql}
      - DB_NAME=${DB_NAME:-postgres}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-your_supabase_password_here}
      - DB_HOST=${DB_HOST:-db.gxpphoctlyuwoucoummy.supabase.co}
      - DB_PORT=${DB_PORT:-5432}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: sansons_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
