services:
  backend:
    image: ghcr.io/moizahmad08/samsonpos-backend:latest
    container_name: sansons_backend
    restart: always
    environment:
      - DB_NAME=${DB_NAME:-postgres}
      - DB_USER=${DB_USER:-postgres.gxpphoctlyuwoucoummy}
      - DB_PASSWORD=${DB_PASSWORD:-sb_secret_i7r5F52MCe3AkPMFsgGy1A_2xWFyGur}
      - DB_HOST=${DB_HOST:-aws-1-ap-northeast-1.pooler.supabase.com}
      - DB_PORT=${DB_PORT:-6543}
    ports:
      - "6000:8000"

  frontend:
    image: ghcr.io/moizahmad08/samsonpos-frontend:latest
    container_name: sansons_frontend
    restart: always
    ports:
      - "4000:80"
    depends_on:
      - backend
